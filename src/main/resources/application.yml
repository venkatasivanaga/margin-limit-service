spring:
  application:
    name: margin-limit-service
  datasource:
    url: jdbc:postgresql://localhost:5432/margin_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    mongodb:
      uri: mongodb://localhost:27017/margin_audit_db

# NEW BLOCK: Expose health and metrics endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}